<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Variedades Arnely</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="contenedor">

<h1>VARIEDADES ARNELY</h1>

<!-- ============================= -->
<!-- CALCULADORA 1 -->
<!-- ============================= -->

<div class="calculadora">

<h2>Pesos ➜ Bolívares ➜ Dólares</h2>

<label>Pesos Colombianos</label>

<input
type="number"
id="pesos"
  inputmode="numeric"
placeholder="Ej: 100000">

<label>Tasa</label>

<input
type="number"
step="0.01"
id="tasa1"
placeholder="Ej: 5.4">

<label>BCV</label>

<input
type="number"
step="0.01"
id="bcv1"
placeholder="Ej: 736.93">

<button id="calcular1">

CALCULAR

</button>

<div class="resultado">

<p>

Bolívares

</p>

<h3 id="resultadoBs">

0

</h3>

<p>

Dólares

</p>

<h3 id="resultadoUsd">

0

</h3>

</div>

<button id="copiar1">

COPIAR

</button>

<button id="whatsapp1">

COMPARTIR WHATSAPP

</button>

<button id="limpiar1">

LIMPIAR

</button>

</div>

<hr>

<!-- ============================= -->
<!-- CALCULADORA 2 -->
<!-- ============================= -->

<div class="calculadora">

<h2>Dólares ➜ Bolívares ➜ Pesos</h2>

<label>Dólares</label>

<input
type="number"
step="0.01"
id="dolares"
placeholder="Ej: 10">

<label>BCV</label>

<input
type="number"
step="0.01"
id="bcv2"
placeholder="Ej: 736.93">

<label>Tasa</label>

<input
type="number"
step="0.01"
id="tasa2"
placeholder="Ej: 5.4">

<button id="calcular2">

CALCULAR

</button>

<div class="resultado">

<p>

Bolívares

</p>

<h3 id="resultadoBs2">

0

</h3>

<p>

Pesos Colombianos

</p>

<h3 id="resultadoCop">

0

</h3>

</div>

<button id="copiar2">

COPIAR

</button>

<button id="whatsapp2">

COMPARTIR WHATSAPP

</button>

<button id="limpiar2">

LIMPIAR

</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
