<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Variedades Arnely - Calculadora</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0B8F3A">

</head>

<body>

<header>
    <h1>VARIEDADES ARNELY</h1>
    <p>Calculadora de Envíos a Venezuela 🇨🇴🇻🇪</p>
</header>

<div class="contenedor">

    <label>Pesos Colombianos (COP)</label>
    <input
        id="cop"
        type="text"
        placeholder="50.000"
    >

    <label>Tasa</label>
    <input
        id="tasa"
        type="number"
        step="0.01"
        value="4.50"
    >

    <label>BCV</label>
    <input
        id="bcv"
        type="number"
        step="0.01"
        value="732.47"
    >

    <button id="calcular">
        CALCULAR
    </button>

    <div class="resultado">

        <h2>Resultado</h2>

        <p id="paso1"></p>

        <p id="paso2"></p>

        <h1 id="resultadoFinal">0 USD</h1>

    </div>

    <div class="botones">

        <button id="copiar">
            📋 Copiar
        </button>

        <button id="whatsapp">
            💬 WhatsApp
        </button>

        <button id="limpiar">
            🗑 Limpiar
        </button>

    </div>

    <div class="historial">

        <h2>Historial</h2>

        <ul id="listaHistorial">

        </ul>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
