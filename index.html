<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variedades Arnely Pro 2.0</title>

    <meta name="theme-color" content="#00c853">

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <img src="assets/logo.png" alt="Logo" class="logo">

    <div>
        <h1>VARIEDADES ARNELY</h1>
        <p>Pro 2.0</p>
    </div>
</header>

<nav class="menu">

    <button class="activo">🏠 Inicio</button>

    <button>💲 Conversor</button>

    <button>🧮 Calculadora</button>

    <button>📦 Productos</button>

    <button>👥 Clientes</button>

    <button>📋 Historial</button>

</nav>

<main>

<section class="card">

<h2>Conversor de Monedas</h2>

<input
type="number"
id="pesos"
placeholder="Ingrese pesos colombianos">

<input
type="number"
id="tasa"
placeholder="Tasa del dólar">

<button id="convertir">
Convertir
</button>

<div id="resultado">

<p>Dólares:
<span id="usd">0</span></p>

<p>Bolívares:
<span id="bs">0</span></p>

</div>

</section>

</main>

<script src="app.js"></script>

</body>
</html>
