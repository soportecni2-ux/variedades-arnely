<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Variedades Arnely Pro 2.0</title>

    <meta name="theme-color" content="#16a34a">

    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <div class="logo">

        <h1>VARIEDADES ARNELY</h1>

        <p>PRO 2.0</p>

    </div>

</header>

<main>

<section class="card">

<h2>💱 Conversor de Monedas</h2>

<div class="campo">

<label>

Pesos Colombianos

</label>

<input
type="number"
id="cop"
placeholder="Ejemplo 100000">

</div>

<div class="campo">

<label>

Precio del dólar (COP)

</label>

<input
type="number"
step="0.01"
id="tasaCop"
placeholder="Ejemplo 5400">

</div>

<div class="campo">

<label>

BCV (Bs por USD)

</label>

<input
type="number"
step="0.01"
id="tasaBcv"
placeholder="Ejemplo 160">

</div>

<button id="btnConvertir">

CONVERTIR

</button>

<div class="resultado">

<h3>Resultado</h3>

<p>

USD

<span id="usd">

0.00

</span>

</p>

<p>

Bolívares

<span id="bs">

0.00

</span>

</p>

</div>

</section>

</main>

<script src="app.js"></script>

</body>

</html>
