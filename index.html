<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VARIEDADES ARNELY</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>VARIEDADES ARNELY</h1>

<!-- ========================================= -->
<!-- CALCULADORA 1 -->
<!-- ========================================= -->

<div class="card">

<h2>Pesos ➜ Bolívares ➜ Dólares</h2>

<label>Pesos Colombianos</label>

<input
type="text"
id="pesos"
placeholder="100.000"
inputmode="numeric">

<label>Tasa</label>

<input
type="number"
id="tasa1"
step="0.01"
placeholder="5.4">

<label>BCV</label>

<input
type="number"
id="bcv1"
step="0.01"
placeholder="736.93">

<button id="calcular1">
CALCULAR
</button>

<div class="resultado">

<p>Bolívares</p>

<h3 id="resultadoBs">
0 Bs
</h3>

<p>Dólares</p>

<h3 id="resultadoUsd">
0 USD
</h3>

</div>

<div class="botones">

<button id="copiar1">
COPIAR
</button>

<button id="whatsapp1">
WHATSAPP
</button>

<button id="limpiar1">
LIMPIAR
</button>

</div>

</div>

<hr>

<!-- ========================================= -->
<!-- CALCULADORA 2 -->
<!-- ========================================= -->

<div class="card">

<h2>Dólares ➜ Bolívares ➜ Pesos</h2>

<label>Dólares</label>

<input
type="number"
id="dolares"
step="0.01"
placeholder="10">

<label>BCV</label>

<input
type="number"
id="bcv2"
step="0.01"
placeholder="736.93">

<label>Tasa</label>

<input
type="number"
id="tasa2"
step="0.01"
placeholder="5.4">

<button id="calcular2">
CALCULAR
</button>

<div class="resultado">

<p>Bolívares</p>

<h3 id="resultadoBs2">
0 Bs
</h3>

<p>Pesos</p>

<h3 id="resultadoCop">
0 COP
</h3>

</div>

<div class="botones">

<button id="copiar2">
COPIAR
</button>

<button id="whatsapp2">
WHATSAPP
</button>

<button id="limpiar2">
LIMPIAR
</button>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
